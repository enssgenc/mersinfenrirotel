# Per-host channel attribution: each alternate domain gets its own utm_source
# so we can see in Analytics/Pixel exactly which surface drove the visit.
map $host $utm_source {
    default                              "alias";
    "mersinfenrirotel.com"               "typo";
    "www.mersinfenrirotel.com"           "typo";
    "mersinfermirgrandotel.com"          "ads";
    "www.mersinfermirgrandotel.com"      "ads";
    "fermirgrandotel.com"                "offline";
    "www.fermirgrandotel.com"            "offline";
    "xn--mersinkzkalesiotel-k0c.com"     "ota";
    "www.xn--mersinkzkalesiotel-k0c.com" "ota";
    "www.mersinfermirotel.com"           "www-direct";
}

map $host $utm_medium {
    default                              "redirect";
    "fermirgrandotel.com"                "print";
    "www.fermirgrandotel.com"            "print";
    "mersinfermirgrandotel.com"          "cpc";
    "www.mersinfermirgrandotel.com"      "cpc";
    "xn--mersinkzkalesiotel-k0c.com"     "referral";
    "www.xn--mersinkzkalesiotel-k0c.com" "referral";
}

# Only append the utm string when the request has no query already, so we
# don't clobber explicit campaign params the user might have set.
map $args $utm_suffix {
    default                              "&utm_source=$utm_source&utm_medium=$utm_medium";
    ""                                   "?utm_source=$utm_source&utm_medium=$utm_medium";
}

server {
    listen 80 default_server;
    server_name _;

    # health for Docker/Coolify probes (no redirect)
    location = /__health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # robots.txt for incoming bots: tell them this domain is just a redirect
    location = /robots.txt {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow:\n\nSitemap: https://mersinfermirotel.com/sitemap.xml\n";
    }

    # Default: 301 permanent to canonical host with channel attribution
    location / {
        return 301 https://mersinfermirotel.com$uri$utm_suffix;
    }
}
