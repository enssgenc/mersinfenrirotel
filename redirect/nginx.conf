map $host $canonical_host {
    default                            "mersinfermirotel.com";
    "mersinfenrirotel.com"             "mersinfermirotel.com";
    "www.mersinfenrirotel.com"         "mersinfermirotel.com";
    "mersinfermirgrandotel.com"        "mersinfermirotel.com";
    "www.mersinfermirgrandotel.com"    "mersinfermirotel.com";
    "fermirgrandotel.com"              "mersinfermirotel.com";
    "www.fermirgrandotel.com"          "mersinfermirotel.com";
    "mersinkizkalesiotel.com"          "mersinfermirotel.com";
    "www.mersinkizkalesiotel.com"      "mersinfermirotel.com";
    "www.mersinfermirotel.com"         "mersinfermirotel.com";
}

server {
    listen 80 default_server;
    server_name _;

    # health for Docker/Coolify probes (no redirect)
    location = /__health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # robots.txt for incoming bots: tell them this domain is just a redirect
    location = /robots.txt {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow:\n\nSitemap: https://mersinfermirotel.com/sitemap.xml\n";
    }

    # Default: 301 permanent to canonical host, preserve full path/query
    location / {
        return 301 https://$canonical_host$request_uri;
    }
}
